<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overlay</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent !important;
        }
        .zone {
            position: absolute;
            pointer-events: none;
            border: 2px solid;
        }
        .zone-edge {
            background: rgba(0, 200, 255, 0.3);
            border-color: rgba(0, 200, 255, 0.8);
        }
        .zone-corner {
            background: rgba(255, 80, 80, 0.4);
            border-color: rgba(255, 80, 80, 0.9);
        }
        .zone-disabled {
            background: rgba(128, 128, 128, 0.15);
            border-color: rgba(128, 128, 128, 0.5);
            border-style: dashed;
        }
        .zone-monitor {
            background: transparent;
            border-color: rgba(255, 255, 255, 0.28);
            border-style: solid;
        }
        #overlay-container {
            width: 100%;
            height: 100%;
            position: relative;
        }
        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }
        .fade-out {
            animation: fadeOut 5s ease forwards;
        }
    </style>
</head>
<body>
    <div id="overlay-container"></div>

    <script>
        const container = document.getElementById('overlay-container');

        function setupTauriListener() {
            if (!window.__TAURI__ || !window.__TAURI__.event) {
                console.log('[Overlay] Tauri not ready, retrying...');
                setTimeout(setupTauriListener, 200);
                return;
            }

            window.__TAURI__.event.listen('zone-data', (event) => {
                renderZones(event.payload);
            });

            window.__TAURI__.event.listen('clear-zones', () => {
                container.innerHTML = '';
                container.classList.remove('fade-out');
            });

            console.log('[Overlay] Event listeners registered');
        }

        function renderZones(data) {
            container.innerHTML = '';
            container.classList.remove('fade-out');
            void container.offsetWidth;
            container.classList.add('fade-out');

            if (!data) return;

            const sw = data.screenWidth;
            const sh = data.screenHeight;
            const monitors = Array.isArray(data.monitors) && data.monitors.length > 0
                ? data.monitors
                : [{ x: 0, y: 0, width: sw, height: sh }];

            for (const monitor of monitors) {
                addZone(monitor.x, monitor.y, monitor.width, monitor.height, 'zone-monitor');
            }

            for (const monitor of monitors) {
                renderMonitorZones(monitor, data);
            }
        }

        function renderMonitorZones(monitor, data) {
            if (data.edgeStopEnabled) {
                const cTL = data.cornerStopEnabled ? data.cornerStopTL : 0;
                const cTR = data.cornerStopEnabled ? data.cornerStopTR : 0;
                const cBL = data.cornerStopEnabled ? data.cornerStopBL : 0;
                const cBR = data.cornerStopEnabled ? data.cornerStopBR : 0;

                addZone(
                    monitor.x + cTL,
                    monitor.y,
                    monitor.width - cTL - cTR,
                    data.edgeStopTop,
                    'zone-edge'
                );
                addZone(
                    monitor.x + cBL,
                    monitor.y + monitor.height - data.edgeStopBottom,
                    monitor.width - cBL - cBR,
                    data.edgeStopBottom,
                    'zone-edge'
                );
                addZone(
                    monitor.x,
                    monitor.y + cTL,
                    data.edgeStopLeft,
                    monitor.height - cTL - cBL,
                    'zone-edge'
                );
                addZone(
                    monitor.x + monitor.width - data.edgeStopRight,
                    monitor.y + cTR,
                    data.edgeStopRight,
                    monitor.height - cTR - cBR,
                    'zone-edge'
                );
            }

            if (data.cornerStopEnabled) {
                addZone(monitor.x, monitor.y, data.cornerStopTL, data.cornerStopTL, 'zone-corner');
                addZone(
                    monitor.x + monitor.width - data.cornerStopTR,
                    monitor.y,
                    data.cornerStopTR,
                    data.cornerStopTR,
                    'zone-corner'
                );
                addZone(
                    monitor.x,
                    monitor.y + monitor.height - data.cornerStopBL,
                    data.cornerStopBL,
                    data.cornerStopBL,
                    'zone-corner'
                );
                addZone(
                    monitor.x + monitor.width - data.cornerStopBR,
                    monitor.y + monitor.height - data.cornerStopBR,
                    data.cornerStopBR,
                    data.cornerStopBR,
                    'zone-corner'
                );
            }
        }

        function addZone(x, y, w, h, cls) {
            if (w <= 0 || h <= 0) return;
            const div = document.createElement('div');
            div.className = 'zone ' + cls;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.style.width = w + 'px';
            div.style.height = h + 'px';
            container.appendChild(div);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', setupTauriListener);
        } else {
            setupTauriListener();
        }
    </script>
</body>
</html>
