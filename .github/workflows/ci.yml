name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (lint + type check + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type check and build
        run: npm run frontend:build

  rust:
    name: Rust (fmt + check + test)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          workdir: src-tauri

      - name: Format
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Check
        working-directory: src-tauri
        run: cargo check --locked

      - name: Test
        working-directory: src-tauri
        run: cargo test --locked

  bundle:
    name: Bundle (${{ matrix.os }})
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    needs:
      - frontend
      - rust
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app for pull requests
        if: github.event_name == 'pull_request'
        run: npm exec tauri build -- --no-bundle --ci

      - name: Build Windows installer
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && runner.os == 'Windows'
        run: npm exec tauri build -- --config src-tauri/tauri.windows.release.conf.json --ci

      - name: Build macOS app bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && runner.os == 'macOS'
        run: npm exec tauri build -- --config src-tauri/tauri.macos.release.conf.json --ci

      - name: Re-sign and package macOS app bundle
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          APP_PATH="src-tauri/target/release/bundle/macos/BlurAutoClicker.app"
          if [[ ! -d "$APP_PATH" ]]; then
            echo "Expected macOS app bundle at $APP_PATH, but it was not found." >&2
            exit 1
          fi

          version="$(node -p "require('./package.json').version")"

          codesign --force --deep --sign - "$APP_PATH"

          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent \
            "$APP_PATH" \
            "release-assets/BlurAutoClicker-${version}-macOS.zip"

      - name: Upload Windows release asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          path: src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error

      - name: Upload macOS release asset
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          path: release-assets/*.zip
          if-no-files-found: error

  release:
    name: Create GitHub release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: bundle
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Extract release metadata from changelog
        id: changelog
        shell: bash
        run: |
          set -euo pipefail

          first_heading="$(grep -m1 '^# v' CHANGELOG.md || true)"
          if [[ -z "$first_heading" ]]; then
            echo "The changelog does not start with a release heading like '# v1.2.3'." >&2
            exit 1
          fi

          version="$(sed -E 's/^# (v[^ ]+).*/\1/' <<<"$first_heading")"
          title="${first_heading#\# }"

          awk '
            /^# v/ {
              seen_versions += 1
              if (seen_versions > 1) {
                exit
              }
              next
            }
            seen_versions == 1 {
              print
            }
          ' CHANGELOG.md > release-notes.md

          perl -0pi -e 's/\A\s+//; s/\s+\z/\n/' release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "The latest changelog entry has no release notes." >&2
            exit 1
          fi

          {
            echo "version=$version"
            echo "title=$title"
            echo "notes_path=release-notes.md"
          } >> "$GITHUB_OUTPUT"

      - name: Check whether the release version already exists
        id: release_state
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ steps.changelog.outputs.version }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;

            let releaseExists = false;
            let tagExists = false;

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag
              });
              releaseExists = true;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`
              });
              tagExists = true;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const shouldRelease = !releaseExists && !tagExists;

            core.setOutput("release_exists", String(releaseExists));
            core.setOutput("tag_exists", String(tagExists));
            core.setOutput("should_release", String(shouldRelease));

      - name: Download release assets
        if: steps.release_state.outputs.should_release == 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Create GitHub release
        if: steps.release_state.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2.6.2
        with:
          tag_name: ${{ steps.changelog.outputs.version }}
          name: ${{ steps.changelog.outputs.title }}
          body_path: ${{ steps.changelog.outputs.notes_path }}
          files: |
            release-assets/*.exe
            release-assets/*.zip
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}

      - name: Report skipped release
        if: steps.release_state.outputs.should_release != 'true'
        shell: bash
        run: |
          echo "Skipping release for ${{ steps.changelog.outputs.version }}."
          echo "release_exists=${{ steps.release_state.outputs.release_exists }}"
          echo "tag_exists=${{ steps.release_state.outputs.tag_exists }}"
