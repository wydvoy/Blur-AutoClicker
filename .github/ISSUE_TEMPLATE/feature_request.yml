name: Feature request
description: Suggest a new feature or improvement for Blur Auto Clicker
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement.
        Please describe the problem or use case first, then the solution you would like to see.

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched the existing issues and pull requests for similar requests.
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do, and what is currently missing or inconvenient?
      placeholder: I want to ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you would like to see.
      placeholder: It would help if Blur Auto Clicker could ...
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - UI / UX
        - Clicking engine
        - Hotkeys
        - Overlay
        - Settings / Storage
        - Installer / Updates
        - Other
    validations:
      required: true

  - type: textarea
    id: why_needed
    attributes:
      label: Why this is needed
      description: Explain why the current behavior is insufficient and why this should be prioritized.
      placeholder: This is needed because ...
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional - describe any workaround or alternative you have considered
      placeholder: I currently work around this by ...

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
      description: Optional - add mockups, references, screenshots, or anything else that helps explain the idea

